<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>My Cookbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f7f3ee;
    --card: #ffffff;
    --accent: #d4541a;
    --accent2: #e8742a;
    --accent-light: rgba(212,84,26,0.09);
    --accent-border: rgba(212,84,26,0.22);
    --dark: #1c1108;
    --mid: #6b5740;
    --light: #b8a898;
    --border: #ede6dc;
    --mono: 'DM Mono', monospace;
    --serif: 'Lora', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--dark); }
  body { font-family: var(--mono); overscroll-behavior: none; }

  #app {
    max-width: 480px; margin: 0 auto;
    min-height: 100vh; background: var(--bg);
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }

  /* ── header ── */
  .header {
    background: var(--dark); padding: 22px 18px 16px;
    position: sticky; top: 0; z-index: 20;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; gap: 12px;
  }
  .header-title {
    flex: 1; font-family: var(--serif); font-size: 20px;
    font-weight: 700; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .btn-back {
    background: rgba(255,255,255,0.08); color: #fff; border: none;
    border-radius: 10px; padding: 8px 12px; font-family: var(--mono);
    font-size: 13px; cursor: pointer; flex-shrink: 0;
  }
  .btn-import {
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 9px 14px; font-family: var(--mono);
    font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0;
  }

  /* ── scroll area ── */
  .scroll-area { flex: 1; overflow-y: auto; padding: 18px 18px 80px; -webkit-overflow-scrolling: touch; }

  /* ── categories ── */
  .cat-strip {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .cat-strip::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
    font-family: var(--mono); font-size: 12px; cursor: pointer;
    border: 1.5px solid var(--border); background: var(--card);
    color: var(--mid); white-space: nowrap; transition: all .18s;
  }
  .cat-pill.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  /* ── recipe card ── */
  .recipe-card {
    background: var(--card); border-radius: 18px; padding: 16px 18px;
    margin-bottom: 10px; cursor: pointer; border: 1.5px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    display: flex; align-items: center; gap: 14px;
    transition: box-shadow .18s, transform .18s; animation: fadeUp .3s ease;
  }
  .recipe-card:active { transform: scale(0.98); }
  .recipe-card:hover { box-shadow: 0 6px 20px rgba(212,84,26,0.12); transform: translateY(-1px); }
  .card-icon {
    width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .chip {
    padding: 3px 10px; border-radius: 20px; font-size: 11px;
    font-family: var(--mono); letter-spacing: .04em;
    background: #f0ebe3; color: var(--mid); border: 1px solid #e0d8cc;
  }
  .chip.accent {
    background: var(--accent-light); color: var(--accent);
    border-color: var(--accent-border);
  }

  /* ── section label ── */
  .slabel {
    font-family: var(--mono); font-size: 10px; color: var(--light);
    letter-spacing: .12em; margin-bottom: 10px; font-weight: 600;
  }

  /* ── detail card box ── */
  .dbox {
    background: var(--card); border-radius: 16px; padding: 18px;
    margin-bottom: 16px; border: 1.5px solid var(--border);
  }

  /* ── serving control ── */
  .serving-ctrl {
    display: flex; align-items: center;
    background: var(--accent-light); border: 1.5px solid var(--accent-border);
    border-radius: 12px; overflow: hidden;
  }
  .serving-btn {
    width: 40px; height: 40px; border: none; background: transparent;
    color: var(--accent); font-size: 20px; cursor: pointer; font-weight: 700;
    font-family: var(--mono);
  }
  .serving-num {
    padding: 0 14px; font-family: var(--mono); font-size: 15px;
    font-weight: 700; color: var(--dark); min-width: 80px; text-align: center;
  }
  .serving-sub { color: var(--light); font-size: 10px; display: block; margin-top: -2px; }

  /* ── ingredient row ── */
  .ing-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .ing-check {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
    border: 2px solid var(--border); transition: all .15s;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff;
  }
  .ing-check.done { background: var(--accent); border-color: var(--accent); }
  .ing-text { font-family: var(--mono); font-size: 13.5px; color: var(--dark); transition: all .2s; }
  .ing-text.done { color: var(--light); text-decoration: line-through; }
  .ing-amount { color: var(--accent); font-weight: 600; }
  .ing-amount.done { color: var(--light); }

  /* ── step row ── */
  .step-row { display: flex; gap: 14px; margin-bottom: 20px; align-items: flex-start; }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
  }
  .step-text { font-family: var(--serif); font-size: 15.5px; line-height: 1.7; color: var(--dark); }

  /* ── CTA button ── */
  .btn-cook {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 16px;
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: .07em;
    box-shadow: 0 8px 24px rgba(212,84,26,0.28);
    transition: transform .15s;
  }
  .btn-cook:active { transform: scale(0.98); }

  /* ── modal overlay ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(28,17,8,0.65);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; backdrop-filter: blur(5px);
    animation: fadein .2s ease;
  }
  .modal-sheet {
    background: var(--card); border-radius: 24px 24px 0 0;
    padding: 28px 22px 48px; width: 100%; max-width: 480px;
    animation: slideUp .28s cubic-bezier(.22,1,.36,1);
  }
  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 22px;
  }

  /* ── input / textarea ── */
  .inp {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-family: var(--mono); font-size: 13px;
    color: var(--dark); background: var(--bg); outline: none;
    transition: border-color .2s; resize: vertical;
  }
  .inp:focus { border-color: var(--accent-border); }
  .inp-label {
    display: block; font-family: var(--mono); font-size: 10px;
    color: var(--light); letter-spacing: .1em; margin-bottom: 6px; font-weight: 600;
  }

  /* ── cook mode ── */
  #cook-screen {
    position: fixed; inset: 0; background: #141008; color: #fff;
    overflow-y: auto; z-index: 200; display: none;
    -webkit-overflow-scrolling: touch;
  }
  #cook-screen.active { display: block; }
  .cook-header { padding: 24px 20px 16px; }
  .progress-bar { display: flex; gap: 3px; margin: 16px 0; }
  .prog-seg {
    flex: 1; height: 3px; border-radius: 2px; cursor: pointer;
    background: rgba(255,255,255,0.12); transition: background .3s;
  }
  .prog-seg.done { background: var(--accent); }
  .prog-seg.active { background: #fff; }
  .step-card-dark {
    background: rgba(255,255,255,0.04); border-radius: 20px;
    padding: 26px 22px; margin-bottom: 18px;
    border: 1px solid rgba(212,84,26,0.25);
  }
  .cook-ing { padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .cook-check {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.15); transition: all .15s;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
  }
  .cook-check.done { background: var(--accent); border-color: var(--accent); }

  /* ── empty state ── */
  .empty { text-align: center; padding: 70px 20px; color: var(--light); }
  .empty-icon { font-size: 52px; margin-bottom: 16px; }

  /* ── search ── */
  .search-inp {
    width: 100%; padding: 12px 16px; margin-bottom: 14px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: var(--mono); font-size: 13px; color: var(--dark);
    background: var(--card); outline: none;
  }
  .search-inp:focus { border-color: var(--accent-border); }

  /* ── spinner ── */
  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite; display: inline-block; flex-shrink: 0;
  }

  /* ── notes box ── */
  .notes-box {
    background: var(--accent-light); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 18px;
    border: 1px solid var(--accent-border);
  }

  /* ── yt link ── */
  .yt-link {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    margin-bottom: 16px; background: rgba(255,0,0,0.06);
    border: 1px solid rgba(255,0,0,0.14); border-radius: 12px;
    text-decoration: none; font-family: var(--mono); font-size: 12px; color: #b03020;
  }

  /* ── action row ── */
  .action-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .btn-edit {
    flex: 1; padding: 13px; background: #f0ebe3; color: var(--mid);
    border: none; border-radius: 12px; font-family: var(--mono);
    font-size: 12px; cursor: pointer;
  }
  .btn-delete {
    padding: 13px 16px; background: rgba(180,50,30,0.08); color: #b03020;
    border: none; border-radius: 12px; font-family: var(--mono);
    font-size: 12px; cursor: pointer;
  }

  /* ── generic buttons ── */
  .btn-primary {
    flex: 2; padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 12px;
    font-family: var(--mono); font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:disabled { background: #ccc; cursor: default; }
  .btn-secondary {
    flex: 1; padding: 14px; background: #f0ebe3; color: var(--mid);
    border: none; border-radius: 12px; font-family: var(--mono);
    font-size: 13px; cursor: pointer;
  }

  /* ── category badge pill ── */
  .cat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: 13px;
    font-family: var(--mono); font-weight: 600;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes fadein { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:none; } }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header" id="main-header">
    <button class="btn-back" id="btn-back" style="display:none" onclick="goBack()">←</button>
    <div class="header-title" id="header-title">My Cookbook</div>
    <button class="btn-import" id="btn-import-top" onclick="openImport()">▶ Import</button>
  </div>

  <!-- Main scroll -->
  <div class="scroll-area" id="main-scroll">

    <!-- LIST VIEW -->
    <div id="view-list">
      <input class="search-inp" id="search-inp" placeholder="🔍  Search recipes or ingredients…" oninput="renderList()"/>
      <div class="cat-strip" id="cat-strip"></div>
      <div id="recipe-list"></div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="view-detail" style="display:none;padding-bottom:60px"></div>

    <!-- EDIT VIEW -->
    <div id="view-edit" style="display:none;padding-bottom:60px"></div>

  </div><!-- /scroll-area -->
</div><!-- /app -->

<!-- Cook screen -->
<div id="cook-screen">
  <div class="cook-header">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <button onclick="closeCook()" style="background:rgba(255,255,255,0.08);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:var(--mono);font-size:12px;cursor:pointer">← Exit</button>
      <div style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em">COOK MODE</div>
      <div style="font-family:var(--mono);font-size:13px;color:#c8a882" id="cook-progress-label"></div>
    </div>
    <div style="font-family:var(--serif);font-size:18px;font-weight:700;color:#fff;margin-top:6px" id="cook-title"></div>
    <div class="progress-bar" id="cook-prog-bar"></div>
  </div>
  <div style="padding:0 20px">
    <div class="step-card-dark" id="cook-step-card"></div>
    <div style="display:flex;gap:10px;margin-bottom:28px">
      <button id="cook-prev" onclick="cookPrev()" style="flex:1;padding:15px;background:rgba(255,255,255,0.09);color:#fff;border:none;border-radius:14px;font-family:var(--mono);font-size:13px;cursor:pointer">← Prev</button>
      <button id="cook-next" onclick="cookNext()" style="flex:2;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer">Next Step →</button>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:#7a6a5a;letter-spacing:.12em;margin-bottom:10px" id="cook-ing-label"></div>
    <div id="cook-ing-list"></div>
  </div>
</div>

<!-- Import modal -->
<div class="modal-bg" id="import-modal" style="display:none" onclick="e=>e.target===this&&closeImport()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div style="font-family:var(--serif);font-size:22px;font-weight:700;color:var(--dark);margin-bottom:6px">Import from YouTube</div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--mid);margin-bottom:20px;line-height:1.6">
      Paste a YouTube cooking link — AI extracts the full recipe, measurements, and assigns the right category automatically.
    </div>
    <input class="inp" id="import-url" placeholder="https://youtube.com/watch?v=…" style="margin-bottom:12px" onkeydown="if(event.key==='Enter')doImport()"/>
    <div id="import-err" style="display:none;font-family:var(--mono);font-size:12px;color:#b03020;padding:10px 14px;background:rgba(180,50,30,0.08);border-radius:8px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn-secondary" onclick="closeImport()">Cancel</button>
      <button class="btn-primary" id="import-btn" onclick="doImport()">✨ Extract Recipe</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
// ── Storage ──────────────────────────────────────────────────────────────────
const STORE = 'yt-cookbook-v3';
let recipes = [];
try { recipes = JSON.parse(localStorage.getItem(STORE)) || []; } catch{}
function persist() { try { localStorage.setItem(STORE, JSON.stringify(recipes)); } catch{} }

// ── State ────────────────────────────────────────────────────────────────────
let currentView = 'list';
let selectedId = null;
let currentServings = 4;
let cookStep = 0;
let cookChecked = {};
let activeCategory = 'All';

// ── Category config ──────────────────────────────────────────────────────────
const CAT = {
  'Chicken':   { emoji: '🍗', color: '#e67e22' },
  'Beef':      { emoji: '🥩', color: '#c0392b' },
  'Pork':      { emoji: '🐷', color: '#e84393' },
  'Seafood':   { emoji: '🐟', color: '#2980b9' },
  'Mixed Meats':{ emoji: '🍖', color: '#8e44ad' },
  'Vegetarian':{ emoji: '🥦', color: '#27ae60' },
  'Pasta':     { emoji: '🍝', color: '#d4a017' },
  'Soup':      { emoji: '🍲', color: '#e74c3c' },
  'Salad':     { emoji: '🥗', color: '#2ecc71' },
  'Dessert':   { emoji: '🍰', color: '#e91e8c' },
  'Breakfast': { emoji: '🥞', color: '#f39c12' },
  'Baking':    { emoji: '🍞', color: '#795548' },
  'Asian':     { emoji: '🍜', color: '#e74c3c' },
  'Mexican':   { emoji: '🌮', color: '#f39c12' },
  'Indian':    { emoji: '🍛', color: '#ff9800' },
  'Other':     { emoji: '🍳', color: '#607d8b' },
};

function catEmoji(cat) { return CAT[cat] && CAT[cat].emoji || '🍳'; }

// ── Scale amounts ────────────────────────────────────────────────────────────
function scaleText(text, ratio) {
  if (ratio === 1) return text;
  return text.replace(/(\d+\s*\/\s*\d+|\d*\.\d+|\d+)/g, m => {
    let v = m.includes('/') ? (()=>{ const [a,b]=m.split('/').map(s=>parseFloat(s.trim())); return a/b; })() : parseFloat(m);
    const s = v * ratio;
    return Number.isInteger(s) ? String(s) : parseFloat(s.toFixed(1)).toString();
  });
}
function scaleAmt(amt, ratio) {
  if (!amt || amt === 0) return null;
  const s = amt * ratio;
  return Number.isInteger(s) ? String(s) : parseFloat(s.toFixed(1)).toString();
}

// ── AI Import ────────────────────────────────────────────────────────────────
async function doImport() {
  const url = document.getElementById('import-url').value.trim();
  if (!url) return;
  const btn = document.getElementById('import-btn');
  const err = document.getElementById('import-err');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Extracting…';
  err.style.display = 'none';

  const prompt = `You are a cooking assistant. The user provided this YouTube URL: ${url}

Identify the recipe from the URL. If you know this specific video, use that exact recipe. Otherwise, infer a plausible recipe from the URL clues.

AUTO-CATEGORY RULES (apply these strictly):
- Count distinct meat/seafood types in the recipe:
  - If only chicken → category = "Chicken"
  - If only beef → category = "Beef"
  - If only pork → category = "Pork"
  - If only seafood/fish/shrimp/etc → category = "Seafood"
  - If 2+ different meats OR any mix of meat+seafood → category = "Mixed Meats"
  - If no meat or seafood at all, check:
    - pasta/noodle dish → "Pasta"
    - soup/stew/broth → "Soup"
    - salad → "Salad"
    - cake/cookie/sweet/dessert → "Dessert"
    - egg/pancake/waffle/morning → "Breakfast"
    - bread/pastry/baked good → "Baking"
    - thai/japanese/chinese/korean/vietnamese → "Asian"
    - tacos/burrito/enchilada → "Mexican"
    - curry/dal/biryani → "Indian"
    - otherwise → "Vegetarian" if plant-based, else "Other"

Respond ONLY with valid JSON, no markdown fences:
{
  "title": "Recipe name",
  "category": "One of: Chicken, Beef, Pork, Seafood, Mixed Meats, Vegetarian, Pasta, Soup, Salad, Dessert, Breakfast, Baking, Asian, Mexican, Indian, Other",
  "servings": 4,
  "time": "30 min",
  "ingredients": [
    { "amount": 200, "unit": "g", "name": "spaghetti" },
    { "amount": 2, "unit": "tbsp", "name": "olive oil" },
    { "amount": 3, "unit": "", "name": "garlic cloves" }
  ],
  "steps": ["Step one with measurements.", "Step two."],
  "notes": "Key tips from the video"
}

Rules:
- amounts must be numbers. Use 0 if none.
- unit: g, kg, ml, l, tsp, tbsp, cup, oz, lb, or "" for countable items
- steps must include exact quantities inline so each step is self-contained
- Be precise with measurements`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = (function(){ var c = data.content && data.content.find(function(b){ return b.type==='text'; }); return c ? c.text : ''; })();
    const clean = text.replace(/```json|```/g, '').trim();
    const recipe = JSON.parse(clean);
    recipe.id = Date.now().toString();
    recipe.source = url;
    recipes.unshift(recipe);
    persist();
    closeImport();
    showDetail(recipe.id);
  } catch(e) {
    err.textContent = 'Couldn\'t extract recipe. Check the URL and try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '✨ Extract Recipe';
  }
}

// ── Navigation ───────────────────────────────────────────────────────────────
function showView(v) {
  ['view-list','view-detail','view-edit'].forEach(id => {
    document.getElementById(id).style.display = id === 'view-'+v ? 'block' : 'none';
  });
  currentView = v;
  document.getElementById('btn-back').style.display = v === 'list' ? 'none' : 'flex';
  document.getElementById('btn-import-top').style.display = v === 'list' ? 'flex' : 'none';
  document.getElementById('main-scroll').scrollTop = 0;
}

function goBack() {
  if (currentView === 'edit') showDetail(selectedId);
  else { selectedId = null; setHeader('My Cookbook'); showView('list'); renderList(); }
}

function setHeader(t) { document.getElementById('header-title').textContent = t; }

// ── List ─────────────────────────────────────────────────────────────────────
function allCategories() {
  const cats = new Set(recipes.map(r => r.category).filter(Boolean));
  return ['All', ...Object.keys(CAT).filter(k => cats.has(k))];
}

function renderCatStrip() {
  const strip = document.getElementById('cat-strip');
  strip.innerHTML = allCategories().map(cat => {
    const active = cat === activeCategory;
    const em = cat === 'All' ? '🍽️' : catEmoji(cat);
    return `<button class="cat-pill${active?' active':''}" onclick="setCategory('${cat}')">${em} ${cat}</button>`;
  }).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderCatStrip();
  renderList();
}

function renderList() {
  renderCatStrip();
  const q = document.getElementById('search-inp').value.toLowerCase();
  const list = document.getElementById('recipe-list');

  const filtered = recipes.filter(r => {
    const matchCat = activeCategory === 'All' || r.category === activeCategory;
    const matchSearch = !q || (r.title && r.title.toLowerCase()).includes(q) ||
      (r.category && r.category.toLowerCase()).includes(q) ||
      r.ingredients && r.ingredients.some(function(i){ return i.name && i.name.toLowerCase().includes(q);})
    return matchCat && matchSearch;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div>
      ${q || activeCategory!=='All' ? '<div style="font-size:14px">No recipes found.</div>' :
      '<div style="font-size:14px;margin-bottom:8px">No recipes yet.</div><div style="font-size:12px">Tap <strong style="color:var(--accent)">▶ Import</strong> and paste a YouTube link!</div>'}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const em = catEmoji(r.category || 'Other');
    const catColor = CAT[r.category] && CAT[r.category].color || '#607d8b';
    return `<div class="recipe-card" onclick="showDetail('${r.id}')">
      <div class="card-icon">${em}</div>
      <div class="card-body">
        <div class="card-title">${esc(r.title)}</div>
        <div class="card-meta">
          ${r.time ? `<span class="chip">⏱ ${esc(r.time)}</span>` : ''}
          ${r.servings ? `<span class="chip">👤 ${r.servings}</span>` : ''}
          ${r.category ? `<span class="chip accent" style="background:${catColor}18;color:${catColor};border-color:${catColor}33">${em} ${esc(r.category)}</span>` : ''}
        </div>
      </div>
      <div style="color:var(--light);font-size:20px">›</div>
    </div>`;
  }).join('');
}

// ── Detail ───────────────────────────────────────────────────────────────────
function showDetail(id) {
  selectedId = id;
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  currentServings = r.servings || 4;
  setHeader(r.title);
  showView('detail');
  renderDetail();
}

function renderDetail() {
  const r = recipes.find(x => x.id === selectedId);
  if (!r) return;
  const base = r.servings || 4;
  const ratio = currentServings / base;
  const catColor = CAT[r.category] && CAT[r.category].color || '#607d8b';
  const em = catEmoji(r.category || 'Other');

  let html = '';

  // Category badge
  html += `<div style="margin-bottom:16px">
    <span class="cat-badge" style="background:${catColor}18;color:${catColor};border:1.5px solid ${catColor}33">
      ${em} ${esc(r.category || 'Other')}
    </span>
  </div>`;

  // Serving control
  html += `<div class="dbox" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <div class="slabel" style="margin-bottom:3px">ADJUST SERVINGS</div>
      <div style="font-family:var(--mono);font-size:12px;color:${ratio!==1?'var(--accent)':'var(--light)'}">
        ${ratio===1 ? `Base: ${base} servings` : `×${parseFloat(ratio.toFixed(2))} all quantities`}
      </div>
    </div>
    <div class="serving-ctrl">
      <button class="serving-btn" onclick="changeServings(-1)">−</button>
      <div class="serving-num">${currentServings}<span class="serving-sub">servings</span></div>
      <button class="serving-btn" onclick="changeServings(1)">+</button>
    </div>
  </div>`;

  // YT link
  if (r.source) {
    html += `<a href="${esc(r.source)}" target="_blank" rel="noopener noreferrer" class="yt-link">
      <span style="font-size:16px">▶</span> Watch original on YouTube
    </a>`;
  }

  // Meta chips
  html += `<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px">`;
  if (r.time) html += `<span class="chip">⏱ ${esc(r.time)}</span>`;
  html += `</div>`;

  // Ingredients
  html += `<div class="dbox"><div class="slabel">INGREDIENTS — tap to check off</div>`;
  (r.ingredients||[]).filter(i=>i.name && i.name.trim()).forEach((ing,i) => {
    const scaled = scaleAmt(ing.amount, ratio);
    html += `<div class="ing-row" onclick="toggleIng(${i})">
      <div class="ing-check" id="chk-${i}"></div>
      <span class="ing-text" id="ing-${i}">
        ${scaled ? `<span class="ing-amount" id="ing-amt-${i}">${scaled}${ing.unit?' '+ing.unit:''} </span>` : ''}${esc(ing.name)}
      </span>
    </div>`;
  });
  html += `</div>`;

  // Steps
  html += `<div class="dbox"><div class="slabel">METHOD</div>`;
  (r.steps||[]).filter(s=>s && s.trim()).forEach((step,i) => {
    html += `<div class="step-row">
      <div class="step-num">${i+1}</div>
      <div class="step-text">${esc(scaleText(step, ratio))}</div>
    </div>`;
  });
  html += `</div>`;

  // Notes
  if (r.notes) {
    html += `<div class="notes-box">
      <div class="slabel">💡 NOTES</div>
      <div style="font-family:var(--mono);font-size:13px;color:#5a3a20;line-height:1.6">${esc(r.notes)}</div>
    </div>`;
  }

  // Actions
  html += `<div class="action-row">
    <button class="btn-edit" onclick="showEdit()">✏️ Edit</button>
    <button class="btn-delete" onclick="deleteRecipe()">🗑</button>
  </div>`;

  html += `<button class="btn-cook" onclick="startCook()">🍳 START COOKING</button>`;

  document.getElementById('view-detail').innerHTML = html;
}

function changeServings(d) {
  currentServings = Math.max(1, currentServings + d);
  renderDetail();
}

const ingChecked = {};
function toggleIng(i) {
  ingChecked[selectedId] = ingChecked[selectedId] || {};
  ingChecked[selectedId][i] = !ingChecked[selectedId][i];
  const done = ingChecked[selectedId][i];
  document.getElementById('chk-'+i).className = 'ing-check' + (done?' done':'');
  document.getElementById('chk-'+i).textContent = done ? '✓' : '';
  document.getElementById('ing-'+i).className = 'ing-text' + (done?' done':'');
  const amt = document.getElementById('ing-amt-'+i);
  if (amt) amt.className = 'ing-amount' + (done?' done':'');
}

function deleteRecipe() {
  if (!confirm('Delete this recipe?')) return;
  recipes = recipes.filter(r => r.id !== selectedId);
  persist();
  selectedId = null;
  setHeader('My Cookbook');
  showView('list');
  renderList();
}

// ── Edit ─────────────────────────────────────────────────────────────────────
function showEdit() {
  const r = recipes.find(x => x.id === selectedId);
  if (!r) return;
  setHeader('Edit Recipe');
  showView('edit');

  const ingsText = (r.ingredients||[]).map(i =>
    `${i.amount>0 ? i.amount+(i.unit?' '+i.unit:'')+ ' ':''}${i.name}`
  ).join('\n');
  const stepsText = (r.steps||[]).join('\n\n');
  const catOptions = Object.keys(CAT).map(k =>
    `<option value="${k}" ${r.category===k?'selected':''}>${catEmoji(k)} ${k}</option>`
  ).join('');

  document.getElementById('view-edit').innerHTML = `
    <div style="padding-bottom:40px">
      <label class="inp-label">TITLE</label>
      <input class="inp" id="e-title" value="${esc(r.title||'')}" style="margin-bottom:16px"/>

      <label class="inp-label">CATEGORY</label>
      <select class="inp" id="e-cat" style="margin-bottom:16px;appearance:none">
        ${catOptions}
      </select>

      <label class="inp-label">COOK TIME</label>
      <input class="inp" id="e-time" value="${esc(r.time||'')}" placeholder="e.g. 30 min" style="margin-bottom:16px"/>

      <label class="inp-label">BASE SERVINGS</label>
      <input class="inp" id="e-servings" type="number" min="1" value="${r.servings||4}" style="margin-bottom:16px"/>

      <label class="inp-label">INGREDIENTS — one per line, e.g. "200 g spaghetti" or "3 garlic cloves"</label>
      <textarea class="inp" id="e-ings" rows="8" style="margin-bottom:16px">${esc(ingsText)}</textarea>

      <label class="inp-label">STEPS — blank line between each step</label>
      <textarea class="inp" id="e-steps" rows="10" style="margin-bottom:16px">${esc(stepsText)}</textarea>

      <label class="inp-label">NOTES</label>
      <textarea class="inp" id="e-notes" rows="3" style="margin-bottom:20px">${esc(r.notes||'')}</textarea>

      <div style="display:flex;gap:10px">
        <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
        <button class="btn-secondary" onclick="showDetail('${r.id}')">Cancel</button>
      </div>
    </div>`;
}

function saveEdit() {
  const r = recipes.find(x => x.id === selectedId);
  if (!r) return;
  r.title = document.getElementById('e-title').value.trim();
  r.category = document.getElementById('e-cat').value;
  r.time = document.getElementById('e-time').value.trim();
  r.servings = parseInt(document.getElementById('e-servings').value) || 4;
  r.notes = document.getElementById('e-notes').value.trim();
  r.ingredients = document.getElementById('e-ings').value.split('\n').filter(l=>l.trim()).map(line => {
    const m = line.match(/^(\d+\.?\d*)\s*(g|kg|ml|l|tsp|tbsp|cup|oz|lb)?\s+(.+)$/i);
    if (m) return { amount: parseFloat(m[1]), unit: m[2]||'', name: m[3].trim() };
    return { amount: 0, unit: '', name: line.trim() };
  });
  r.steps = document.getElementById('e-steps').value.split(/\n\n+/).map(s=>s.replace(/\n/g,' ').trim()).filter(Boolean);
  persist();
  currentServings = r.servings;
  setHeader(r.title);
  showDetail(r.id);
}

// ── Cook mode ─────────────────────────────────────────────────────────────────
function startCook() {
  const r = recipes.find(x => x.id === selectedId);
  if (!r) return;
  cookStep = 0;
  cookChecked = {};
  document.getElementById('cook-screen').classList.add('active');
  renderCook();
}

function closeCook() {
  document.getElementById('cook-screen').classList.remove('active');
}

function renderCook() {
  const r = recipes.find(x => x.id === selectedId);
  if (!r) return;
  const ratio = currentServings / (r.servings || 4);
  const total = r.steps.length;

  document.getElementById('cook-title').textContent = r.title;
  document.getElementById('cook-progress-label').textContent = `${cookStep+1}/${total}`;

  // Progress bar
  document.getElementById('cook-prog-bar').innerHTML = r.steps.map((_,i) =>
    `<div class="prog-seg ${i<cookStep?'done':i===cookStep?'active':''}" onclick="cookGoTo(${i})"></div>`
  ).join('');

  // Step card
  const stepText = scaleText(r.steps[cookStep], ratio);
  document.getElementById('cook-step-card').innerHTML = `
    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:14px">${cookStep+1}</div>
    <p style="font-family:var(--serif);font-size:20px;line-height:1.7;color:#fff;margin:0">${esc(stepText)}</p>`;

  // Prev/Next buttons
  document.getElementById('cook-prev').style.opacity = cookStep===0 ? '0.3' : '1';
  if (cookStep >= total-1) {
    document.getElementById('cook-next').textContent = '✓ Done!';
    document.getElementById('cook-next').style.background = 'linear-gradient(135deg,#2e8b57,#3dbf76)';
    document.getElementById('cook-next').onclick = closeCook;
  } else {
    document.getElementById('cook-next').textContent = 'Next Step →';
    document.getElementById('cook-next').style.background = 'linear-gradient(135deg,var(--accent),var(--accent2))';
    document.getElementById('cook-next').onclick = cookNext;
  }

  // Ingredients
  document.getElementById('cook-ing-label').textContent = `INGREDIENTS — ${currentServings} servings`;
  document.getElementById('cook-ing-list').innerHTML = (r.ingredients||[]).map((ing,i) => {
    const scaled = scaleAmt(ing.amount, ratio);
    const done = !!cookChecked[i];
    return `<div class="cook-ing" onclick="toggleCookIng(${i})">
      <div class="cook-check${done?' done':''}" id="ck-${i}">${done?'✓':''}</div>
      <span style="font-family:var(--mono);font-size:13px;color:${done?'#4a3a2a':'#c8b8a0'};text-decoration:${done?'line-through':'none'}">
        ${scaled ? `<strong style="color:${done?'#4a3a2a':'var(--accent)'}">${scaled}${ing.unit?' '+ing.unit:''} </strong>` : ''}${esc(ing.name)}
      </span>
    </div>`;
  }).join('');
}

function toggleCookIng(i) {
  cookChecked[i] = !cookChecked[i];
  renderCook();
}
function cookPrev() { if (cookStep>0) { cookStep--; renderCook(); } }
function cookNext() { const r=recipes.find(x=>x.id===selectedId); if(r&&cookStep<r.steps.length-1){cookStep++;renderCook();} }
function cookGoTo(i) { cookStep=i; renderCook(); }

// ── Import modal ──────────────────────────────────────────────────────────────
function openImport() {
  document.getElementById('import-url').value = '';
  document.getElementById('import-err').style.display = 'none';
  document.getElementById('import-btn').disabled = false;
  document.getElementById('import-btn').innerHTML = '✨ Extract Recipe';
  document.getElementById('import-modal').style.display = 'flex';
  setTimeout(()=>document.getElementById('import-url').focus(), 200);
}
function closeImport() {
  document.getElementById('import-modal').style.display = 'none';
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
renderList();
showView('list');

}); // end DOMContentLoaded
