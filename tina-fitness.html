<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tina's Fitness Plan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      padding: 24px 20px 48px;
    }
    h1 { font-family: 'Space Mono', monospace; font-size: 21px; }
    .badge { display: inline-block; margin-top: 10px; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .header { text-align: center; margin-bottom: 28px; }
    .date-label { font-size: 12px; letter-spacing: 3px; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
    .now-card { border-radius: 16px; padding: 18px; margin-bottom: 20px; background: rgba(255,255,255,0.06); border-left: 4px solid; }
    .now-label { font-size: 11px; letter-spacing: 2px; color: #aaa; text-transform: uppercase; margin-bottom: 6px; }
    .now-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
    .now-detail { font-size: 13px; color: #ccc; line-height: 1.6; }
    .now-time { margin-top: 6px; font-size: 12px; }
    .section-label { font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 12px; }
    .schedule-item { margin-bottom: 10px; border-radius: 12px; border: 1px solid transparent; transition: all 0.2s; }
    .schedule-row { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; cursor: pointer; }
    .checkbox { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; margin-top: 1px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.2s; }
    .checkbox.done { background: #4ECDC4; border-color: #4ECDC4; }
    .item-label { font-weight: 600; font-size: 14px; }
    .item-label.done { text-decoration: line-through; }
    .item-detail { font-size: 12px; color: #999; margin-top: 3px; line-height: 1.5; }
    .item-time { font-size: 11px; color: #666; margin-top: 3px; }
    .videos-btn { border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 700; flex-shrink: 0; border: 1px solid; background: transparent; }
    .exercise-list { padding: 0 14px 14px; }
    .exercise-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; margin-bottom: 4px; border-radius: 8px; background: rgba(255,255,255,0.05); }
    .exercise-name { font-size: 13px; color: #ddd; }
    .watch-btn { border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer; font-weight: 700; border: 1px solid; background: transparent; }
    .video-panel { margin-top: 10px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); background: #000; }
    .video-panel iframe { width: 100%; height: 200px; border: none; display: block; }
    .video-footer { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #1a1a1a; }
    .yt-link { font-size: 11px; color: #FF4444; text-decoration: none; font-weight: 600; }
    .close-btn { font-size: 11px; color: #888; cursor: pointer; background: none; border: none; }
    .week-grid { display: flex; gap: 6px; }
    .week-day { flex: 1; padding: 8px 2px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); }
    .week-day.today { }
    .week-day-name { font-size: 10px; font-weight: 700; color: #888; }
    .week-day-type { font-size: 8px; color: #666; margin-top: 2px; }
    .nutrition { margin-top: 20px; padding: 13px 16px; border-radius: 12px; background: rgba(255,230,109,0.08); border: 1px solid rgba(255,230,109,0.2); font-size: 12px; color: #FFE66D; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const EXERCISES = {
      "Lower Body Strength": [
        { name: "Squat ×10 ×3", vid: "e1UYgO67zkw" },
        { name: "Glute Bridge ×12 ×3", vid: "mfdlES3uZNA" },
        { name: "Dumbbell Deadlift ×10 ×3", vid: "w_SjJhIB7XU" },
        { name: "Plank 30s ×3", vid: "ASdvSqKTZ6s" },
      ],
      "Upper Body (Arms)": [
        { name: "Shoulder Press ×10 ×3", vid: "seUCEgPsBtc" },
        { name: "Dumbbell Row ×10 ×3", vid: "HUp6djHa37Y" },
        { name: "Bicep Curl ×12 ×3", vid: "K5Sz5sIqaWU" },
        { name: "Tricep Extension ×12 ×3", vid: "YM8iX9BJWjA" },
      ],
      "Light Arms": [
        { name: "Bicep Curl ×12", vid: "K5Sz5sIqaWU" },
        { name: "Tricep Extension ×12", vid: "YM8iX9BJWjA" },
      ],
      "Full Body": [
        { name: "Squat ×10 ×3", vid: "e1UYgO67zkw" },
        { name: "Shoulder Press ×10 ×3", vid: "seUCEgPsBtc" },
        { name: "Plank 30s ×3", vid: "ASdvSqKTZ6s" },
        { name: "Bicep Curl ×12 ×3", vid: "K5Sz5sIqaWU" },
      ],
      "Lunch Walk": [{ name: "Walking Pad How-To", vid: "4kEOLbAFkQ0" }],
      "Cardio Walk": [{ name: "Interval Walk/Run Tutorial", vid: "YnBb3W1430U" }],
      "Rest & Recovery": [{ name: "Full Body Stretching", vid: "L_xrDAtykMI" }],
    };

    const PLAN = {
      1: { type: "Training", label: "Lower Body + Core", schedule: [
        { time: "12:30", label: "🚶 Lunch Walk", detail: "Walking pad • Incline 8–10% • Speed Lv3 • 15–20 mins" },
        { time: "18:00", label: "💪 Lower Body Strength", detail: "Squat ×10 ×3 | Glute Bridge ×12 ×3 | Deadlift ×10 ×3 | Plank 30s ×3" },
      ]},
      2: { type: "Light", label: "Walking / Optional Arms", schedule: [
        { time: "Anytime", label: "🚶 Walking", detail: "Target 6000+ steps (natural on office days)" },
        { time: "Optional", label: "💪 Light Arms", detail: "Bicep Curl ×12 | Tricep Extension ×12" },
      ]},
      3: { type: "Training", label: "Upper Body (Arms)", schedule: [
        { time: "12:30", label: "🚶 Lunch Walk", detail: "Walking pad • Incline 8–10% • Speed Lv3 • 15–20 mins" },
        { time: "18:00", label: "💪 Upper Body (Arms)", detail: "Shoulder Press ×10 ×3 | Row ×10 ×3 | Curl ×12 ×3 | Tricep ×12 ×3" },
      ]},
      4: { type: "Cardio", label: "Incline Walking", schedule: [
        { time: "Anytime", label: "🏃 Cardio Walk", detail: "Interval: Lv3 (2 min) → Lv5–6 (30s) × 6–8 rounds" },
      ]},
      5: { type: "Training", label: "Full Body", schedule: [
        { time: "12:30", label: "🚶 Lunch Walk", detail: "Walking pad • Incline 8–10% • Speed Lv3 • 15–20 mins" },
        { time: "18:00", label: "💪 Full Body", detail: "Mix of lower + upper + core • 30 mins" },
      ]},
      6: { type: "Active", label: "Outdoor Walk / Movement", schedule: [
        { time: "Anytime", label: "🌿 Active Rest", detail: "Outdoor walk • Target 8000–10000 steps" },
      ]},
      0: { type: "Rest", label: "Recovery / Stretching", schedule: [
        { time: "Anytime", label: "😴 Rest & Recovery", detail: "Stretching • Light movement • Sleep by 23:30" },
      ]},
    };

    const TYPE_COLOR = { Training:"#FF6B35", Light:"#4ECDC4", Cardio:"#FFE66D", Active:"#A8E6CF", Rest:"#B8B8FF" };
    const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    const state = {
      now: new Date(),
      done: {},
      expanded: {},
      activeVid: {},
    };

    function getSlot(h) {
      if (h < 12) return "morning";
      if (h < 14) return "lunch";
      if (h < 18) return "afternoon";
      if (h < 20) return "evening";
      return "night";
    }

    function getExercises(label) {
      for (const key of Object.keys(EXERCISES)) {
        if (label.includes(key)) return EXERCISES[key];
      }
      return null;
    }

    function render() {
      const now = state.now;
      const dayNum = now.getDay();
      const day = PLAN[dayNum];
      const hour = now.getHours();
      const slot = getSlot(hour);
      const accent = TYPE_COLOR[day.type];
      const dayName = DAYS[dayNum];

      const greeting = slot === "morning" ? "Good morning, Tina! ☀️"
        : slot === "lunch" ? "Lunch time! 🥗"
        : slot === "afternoon" ? "Keep going! 💪"
        : slot === "evening" ? "Time to train! 🔥"
        : "Wind down 🌙";

      const nextTaskIdx = day.schedule.findIndex((s, i) => {
        if (!state.done[i]) {
          const h = parseInt((s.time || "0").split(":")[0]);
          return isNaN(h) || hour <= h;
        }
        return false;
      });
      const nextTask = nextTaskIdx >= 0 ? day.schedule[nextTaskIdx]
        : day.schedule.find((_, i) => !state.done[i]);

      let html = `
        <div class="header">
          <div class="date-label">${now.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}</div>
          <h1>${greeting}</h1>
          <div class="badge" style="background:${accent}33;border:1px solid ${accent}88;color:${accent}">${dayName}: ${day.type} — ${day.label}</div>
        </div>
      `;

      // NOW card
      if (nextTask) {
        const exList = getExercises(nextTask.label);
        html += `
          <div class="now-card" style="border-color:${accent};box-shadow:0 0 30px ${accent}22">
            <div class="now-label">▶ Do This Now</div>
            <div class="now-title">${nextTask.label}</div>
            <div class="now-detail">${nextTask.detail}</div>
            ${nextTask.time && nextTask.time !== "Anytime" && nextTask.time !== "Optional"
              ? `<div class="now-time" style="color:${accent}">⏰ ${nextTask.time}</div>` : ""}
            ${exList ? renderExerciseList(exList, accent, "now") : ""}
          </div>
        `;
      }

      // Schedule
      html += `<div style="margin-bottom:24px"><div class="section-label">Today's Schedule</div>`;
      day.schedule.forEach((s, i) => {
        const exList = getExercises(s.label);
        const isDone = !!state.done[i];
        const isExpanded = !!state.expanded[i];
        const isNext = s === nextTask && !isDone;
        html += `
          <div class="schedule-item" style="background:${isDone ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.07)"};opacity:${isDone ? 0.5 : 1};border-color:${isNext ? accent + "44" : "transparent"}">
            <div class="schedule-row" onclick="toggleDone(${i})">
              <div class="checkbox ${isDone ? "done" : ""}">${isDone ? "✓" : ""}</div>
              <div style="flex:1">
                <div class="item-label ${isDone ? "done" : ""}">${s.label}</div>
                <div class="item-detail">${s.detail}</div>
                ${s.time ? `<div class="item-time">⏰ ${s.time}</div>` : ""}
              </div>
              ${exList && !isDone ? `<button class="videos-btn" style="color:${accent};border-color:${accent}66;background:${isExpanded ? accent+"33":"transparent"}" onclick="event.stopPropagation();toggleExpanded(${i})">${isExpanded ? "▲" : "📹"}</button>` : ""}
            </div>
            ${exList && isExpanded && !isDone ? `<div class="exercise-list">${renderExerciseList(exList, accent, "s"+i)}</div>` : ""}
          </div>
        `;
      });
      html += `</div>`;

      // Week
      html += `<div><div class="section-label">Week at a Glance</div><div class="week-grid">`;
      [0,1,2,3,4,5,6].forEach(d => {
        const p = PLAN[d];
        const isToday = d === dayNum;
        html += `<div class="week-day" style="${isToday ? `background:${TYPE_COLOR[p.type]}22;border-color:${TYPE_COLOR[p.type]}77` : ""}">
          <div class="week-day-name" style="color:${isToday ? TYPE_COLOR[p.type] : "#888"}">${DAYS[d]}</div>
          <div class="week-day-type">${p.type}</div>
        </div>`;
      });
      html += `</div></div>`;

      // Nutrition
      html += `<div class="nutrition">🍽 No food after 7pm · Protein 70–90g · Sleep by 23:30</div>`;

      document.getElementById("app").innerHTML = html;
    }

    function renderExerciseList(exercises, accent, prefix) {
      let html = `<div style="margin-top:10px">`;
      exercises.forEach((ex, i) => {
        const key = prefix + "_" + i;
        const isActive = !!state.activeVid[key];
        html += `
          <div>
            <div class="exercise-row">
              <span class="exercise-name">${ex.name}</span>
              <button class="watch-btn" style="color:${accent};border-color:${accent}77;background:${isActive ? accent+"44":"transparent"}"
                onclick="toggleVid('${key}','${ex.vid}')">${isActive ? "▲ hide" : "▶ watch"}</button>
            </div>
            ${isActive ? renderVideoPanel(ex.vid, key) : ""}
          </div>
        `;
      });
      html += `</div>`;
      return html;
    }

    function renderVideoPanel(videoId, key) {
      return `
        <div class="video-panel">
          <iframe src="https://www.youtube.com/embed/${videoId}?rel=0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>
          <div class="video-footer">
            <a class="yt-link" href="https://www.youtube.com/watch?v=${videoId}" target="_blank">↗ Open in YouTube</a>
            <button class="close-btn" onclick="toggleVid('${key}','${videoId}')">✕ close</button>
          </div>
        </div>
      `;
    }

    function toggleDone(i) {
      state.done[i] = !state.done[i];
      render();
    }

    function toggleExpanded(i) {
      state.expanded[i] = !state.expanded[i];
      render();
    }

    function toggleVid(key, vid) {
      state.activeVid[key] = !state.activeVid[key];
      render();
    }

    // Init
    render();
    setInterval(() => { state.now = new Date(); render(); }, 60000);
  </script>
</body>
</html>
